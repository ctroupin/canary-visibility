<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>Distances El Hierro - La Palma</title>
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			height: 400px;
			width: 600px;
			max-width: 100%;
			max-height: 100%;
		}
		.myDivIcon {
			text-align: center;
			/* Horizontally center the text (icon) */
			line-height: 20px;
			color: #32a15d
			/* Vertically center the text (icon) */
		}
	</style>

	<script>
		function calculateMeanPosition(place1, place2) {
			const meanLat = (place1.lat + place2.lat) / 2;
			const meanLng = (place1.lng + place2.lng) / 2;
			return L.latLng(meanLat, meanLng);
		}
		function calculatePosition1(place1, place2) {
			const factor = 0.4
			const meanLat = factor * place1.lat + (1-factor) * place2.lat;
			const meanLng = factor * place1.lng + (1-factor) * place2.lng;
			return L.latLng(meanLat, meanLng);
		}
		function calculatePosition2(place1, place2) {
			const factor = 0.4
			const meanLat = factor * place2.lat + (1-factor) * place1.lat;
			const meanLng = factor * place2.lng + (1-factor) * place1.lng;
			return L.latLng(meanLat, meanLng);
		}

	</script> 

	
</head>
<body>

<div id="map" style="width: 800px; height: 1600px;"></div>
<script>

	topIsland1 = L.latLng(27.72919, -18.04044);
	topIsland2 = L.latLng(28.75448, -17.88511);
	closestIsland1 = L.latLng(27.84936, -17.92358);
	closestIsland2 = L.latLng(28.45263, -17.84225); 
	
	var distText = (topIsland1.distanceTo(topIsland2)/1000.).toFixed(1) + " km";
	var distTextClose = (closestIsland1.distanceTo(closestIsland2)/1000.).toFixed(1) + " km";


	const map = L.map('map').setView(calculateMeanPosition(topIsland1, topIsland2), 9);
	L.tileLayer.provider('CartoDB.Positron').addTo(map);
	var baseMaps = {
		"CartoDB": L.tileLayer.provider('CartoDB.Positron'),
		"CyclOSM": L.tileLayer.provider('CyclOSM'),
		"OpenStreetMap": L.tileLayer.provider('OpenStreetMap.Mapnik'),
		"ESRI World Imagery": L.tileLayer.provider('Esri.WorldImagery'),
	};


	const fontAwesomeIcon = L.divIcon({
		html: '<i class="fa-solid fa-mountain fa-2x"></i>',
		iconSize: [40, 40],
		className: 'myDivIcon',
	});

	const marker1 = L.marker(topIsland1, {icon: fontAwesomeIcon}).addTo(map)
	const marker2 = L.marker(topIsland2, {icon: fontAwesomeIcon}).addTo(map)
	const marker3 = L.marker(closestIsland1).addTo(map)
	const marker4 = L.marker(closestIsland2).addTo(map)
	const geodesic = new L.Geodesic([topIsland1, topIsland2]).addTo(map);
	const geodesic2 = new L.Geodesic([closestIsland1, closestIsland2], {color: 'green', weight: '3', dashArray: '7, 7', dashOffset: '20'}).addTo(map);
	
	var myCustomText = L.divIcon({
		html: `<div style="color: blue; font-size: 18px; background-color: rgba(255, 255, 255, 0.7); white-space: nowrap;">${distText}</div>`,
		className: 'custom-text-layer', 
		iconSize: null // Empêche Leaflet de forcer une taille fixe carrée
	});
	var myCustomText2 = L.divIcon({
		html: `<div style="color: green; font-size: 18px; background-color: rgba(255, 255, 255, 0.7); white-space: nowrap;">${distTextClose}</div>`,
		className: 'custom-text-layer', 
		iconSize: null // Empêche Leaflet de forcer une taille fixe carrée
	});

	L.marker(calculatePosition1(topIsland1, topIsland2), { icon: myCustomText }).addTo(map);
	L.marker(calculatePosition2(closestIsland1, closestIsland2), { icon: myCustomText2 }).addTo(map);
	L.control.layers(baseMaps, [], {autoZIndex:false, collapsed:false}).addTo(map);
	
</script>



</body>
</html>
